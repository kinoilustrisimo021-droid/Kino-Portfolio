  <defs><style>.text{font-family:Inter,Segoe UI,Arial,sans-serif}.bg{fill:#050914}.card{fill:#0d111c;stroke:#1f2937;stroke-width:2}.blue{fill:#2f6fed}.cyan{fill:#17c2e8}.violet{fill:#7c3aed}.muted{fill:#6b7280}.white{fill:#f8fafc}.h{font-size:86px;font-weight:900}.s{font-size:20px;font-weight:700;fill:#6b7280}.label{font-size:14px;font-weight:900;fill:#6b7280;letter-spacing:4px}</style></defs>
